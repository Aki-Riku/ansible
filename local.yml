---
- name: "Playing with Ansible and Git"
  hosts: localhost
  connection: local 
  become: no
  
  tasks:
    - name: "just execute a ls -lrt command"
      shell: "ls -lrt"
      register: "output"
    - debug: var=output.stdout_lines
  
    - name: "installs program"
      become: no
      homebrew:
        name: htop
        state: present
      
