---
- name: Setup
  hosts: localhost
  become: yes

  tasks:
  - name: Install packages with apt
    become: yes
    ansible.builtin.apt:
      name:
        - htop
      state: present
    when: ansible_distribution == "Ubuntu"

  tasks:
  - become: no
    community.general.homebew:
      name:
        - htop
      state: present
    when: ansible_distribution == "MacOSX"
